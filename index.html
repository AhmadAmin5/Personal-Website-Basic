<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary SEO -->
    <title>M Ahmad Amin</title>
    <meta name="title" content="M Ahmad Amin">
    <meta name="description"
        content="Personal portfolio of M Ahmad Amin, showcasing  web development projects, skills, about and contact information.">
    <meta name="author" content="M Ahmad Amin">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="canonical" href="https://ahmadamin5.github.io/Personal-Website-Basic/">

    <!-- Theme / Browser UI -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F7FBFF">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#050505">
    <meta name="color-scheme" content="light dark">

    <!-- Favicons -->
    <link rel="icon" href="./assets/favicons/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="./assests/favicoHns/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicons/apple-touch-icon.png">
    <link rel="manifest" href="./site.webmanifest">

    <!-- Open Graph / Social Share -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="M Ahmad Amin Portfolio">
    <meta property="og:title" content="M Ahmad Amin | Web Developer Portfolio">
    <meta property="og:description"
        content="Personal portfolio of M Ahmad Amin, showcasing web development projects, skills, and contact information.">
    <meta property="og:url" content="https://ahmadamin5.github.io/Personal-Website-Basic/">
    <meta property="og:image" content="https://ahmadamin5.github.io/Personal-Website-Basic/assets/images/preview/og-image.png">
    <meta property="og:image:alt" content="Preview image for M Ahmad Amin portfolio website">
    <meta property="og:locale" content="en_US">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="M Ahmad Amin | Web Developer Portfolio">
    <meta name="twitter:description"
        content="Personal portfolio of M Ahmad Amin, showcasing web development projects, skills, and contact information.">
    <meta name="twitter:image" content="https://ahmadamin5.github.io/Personal-Website-Basic/assets/images/preview/og-image.jpg">

    <!-- app-like naming -->
    <meta name="application-name" content="M Ahmad Amin">
    <meta name="apple-mobile-web-app-title" content="M Ahmad Amin">

    <!-- Styles -->
    <link rel="stylesheet" href="./style.css">

    <!-- structured data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "M Ahmad Amin",
        "url": "https://ahmadamin5.github.io/Personal-Website-Basic/",
        "image": "https://ahmadamin5.github.io/Personal-Website-Basic/assets/images/preview/og-image.jpg",
        "jobTitle": "Web Developer"
    }
    </script>
</head>

<body>
    <header></header>

    <main>
        <img src="./assests/images/preview/og-image.png"/>
    </main>

    <footer></footer>

    <script src="./script.js"></script>
</body>

</html>
